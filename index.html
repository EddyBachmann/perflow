<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perflow</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.4/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060e18;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { display: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes growBar { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes subtleGlow { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.65; } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .screen-enter { animation: fadeIn 0.3s ease-out both; }
    input[type=range]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #C9A96E; cursor: pointer; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── SUPABASE ──────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(
  'https://cngtloxotxqvjxbtbstm.supabase.co',
  'sb_publishable_UEZ25QfhNLg_eG2Fp4NG0A_s2HRLj_J'
);

// ── DESIGN TOKENS ─────────────────────────────────
const C = {
  bg:'#0D1B2A', bgCard:'rgba(255,255,255,0.042)', bgGold:'rgba(201,169,110,0.08)',
  bgGoldSub:'rgba(201,169,110,0.05)', border:'rgba(201,169,110,0.14)',
  borderSub:'rgba(255,255,255,0.07)', gold:'#C9A96E', goldLight:'#DFC49A',
  text:'#F8F5F0', muted:'rgba(248,245,240,0.48)', muted2:'rgba(248,245,240,0.28)',
  tabBg:'rgba(5,12,22,0.97)', paused:'rgba(248,245,240,0.22)',
};

// ── IOS FRAME ─────────────────────────────────────
function IosFrame({ children, time='9:41', battery=92 }) {
  return (
    <div style={{ display:'inline-block', padding:12, background:'#040a12', borderRadius:60,
      boxShadow:'0 0 0 1.5px #111a24, 0 0 0 3px #080f18, 0 40px 90px rgba(0,0,0,0.8)' }}>
      <div style={{ position:'relative', width:393, height:852, borderRadius:48, overflow:'hidden', background:C.bg }}>
        <div style={{ position:'absolute', top:0, left:0, right:0, height:54,
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'0 28px', fontSize:15, fontWeight:600,
          fontFamily:'-apple-system, "SF Pro Text", sans-serif',
          color:C.text, zIndex:20, pointerEvents:'none' }}>
          <span style={{ letterSpacing:'-0.3px' }}>{time}</span>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            {[4,6,9,11].map((h,i)=>(<div key={i} style={{ width:3, height:h, background:C.text, borderRadius:1 }}/>))}
            <div style={{ width:26, height:12, border:'1.5px solid rgba(248,245,240,0.75)', borderRadius:3, padding:1, position:'relative', marginLeft:2 }}>
              <div style={{ width:`${battery}%`, height:'100%', background:C.text, borderRadius:1 }}/>
            </div>
          </div>
        </div>
        <div style={{ position:'absolute', top:12, left:'50%', transform:'translateX(-50%)',
          width:124, height:36, background:'#000', borderRadius:999, zIndex:30 }}/>
        <div style={{ position:'absolute', top:54, left:0, right:0, bottom:34, overflow:'hidden' }}>
          {children}
        </div>
        <div style={{ position:'absolute', bottom:10, left:'50%', transform:'translateX(-50%)',
          width:140, height:5, background:'rgba(248,245,240,0.25)', borderRadius:999, zIndex:10 }}/>
      </div>
    </div>
  );
}

// ── MONOGRAM ──────────────────────────────────────
function Monogram({ size=64, ringOpacity=0.55 }) {
  return (
    <div style={{ width:size, height:size, borderRadius:'50%',
      border:`${size*0.022}px solid rgba(201,169,110,${ringOpacity})`,
      display:'flex', alignItems:'center', justifyContent:'center', position:'relative' }}>
      <div style={{ position:'absolute', inset:size*0.1, borderRadius:'50%',
        border:`${size*0.008}px solid rgba(201,169,110,0.18)` }}/>
      <span style={{ fontFamily:"'Playfair Display', serif", fontSize:size*0.36, fontWeight:400, fontStyle:'italic', color:C.gold }}>P</span>
    </div>
  );
}

// ── TAB BAR ───────────────────────────────────────
const TAB_DEFS = [
  { id:'home', label:'Home', icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg> },
  { id:'protocolo', label:'Protocolo', icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/></svg> },
  { id:'nutricao', label:'Nutricao', icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg> },
  { id:'ai', label:'IA', icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> },
  { id:'perfil', label:'Perfil', icon:<svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> },
];

function TabBar({ active, onTab }) {
  return (
    <div style={{ position:'absolute', bottom:0, left:0, right:0, height:78,
      background:C.tabBg, backdropFilter:'blur(20px)',
      borderTop:`1px solid rgba(201,169,110,0.1)`,
      display:'flex', alignItems:'flex-start', justifyContent:'space-around',
      padding:'10px 0 0', zIndex:50 }}>
      {TAB_DEFS.map(t => {
        const on = active === t.id;
        return (
          <button key={t.id} onClick={()=>onTab(t.id)} style={{
            background:'none', border:'none', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:3,
            color: on ? C.gold : C.muted, transition:'color 0.2s',
            minWidth:0, flex:1, padding:0 }}>
            {t.icon}
            <span style={{ fontSize:9.5, fontFamily:'Inter', fontWeight: on ? 600 : 400, letterSpacing:'0.03em' }}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ── INPUT FIELD ───────────────────────────────────
function InputField({ label, type='text', value, onChange, placeholder }) {
  return (
    <div style={{ marginBottom:14 }}>
      <label style={{ fontFamily:'Inter', fontSize:11, color:C.muted, letterSpacing:'0.06em', display:'block', marginBottom:7 }}>{label}</label>
      <input type={type} value={value} onChange={onChange} placeholder={placeholder}
        style={{ width:'100%', background:C.bgCard, border:`1px solid ${C.border}`,
          borderRadius:14, padding:'13px 15px', fontFamily:'Inter', fontSize:14,
          color:C.text, outline:'none' }}/>
    </div>
  );
}

// ── LOGIN SCREEN ──────────────────────────────────
function LoginScreen({ onRegister }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const handleLogin = async () => {
    if (!email || !password) return setError('Preencha email e senha.');
    setLoading(true); setError('');
    const { error: err } = await sb.auth.signInWithPassword({ email, password });
    if (err) setError(err.message === 'Invalid login credentials' ? 'Email ou senha incorretos.' : err.message);
    setLoading(false);
  };

  return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding:'0 32px', position:'relative', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:'30%', left:'50%', transform:'translate(-50%,-50%)',
        width:280, height:280, borderRadius:'50%',
        background:'radial-gradient(circle, rgba(201,169,110,0.07) 0%, transparent 68%)',
        animation:'subtleGlow 6s ease-in-out infinite', pointerEvents:'none' }}/>
      <div style={{ position:'relative', zIndex:1, width:'100%', maxWidth:310 }}>
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginBottom:36, animation:'fadeUp 0.5s ease-out both' }}>
          <Monogram size={72}/>
          <div style={{ fontFamily:"'Playfair Display', serif", fontSize:26, fontWeight:700, color:C.text, marginTop:16, textAlign:'center' }}>Perflow</div>
          <div style={{ fontFamily:'Inter', fontSize:11, color:C.muted, letterSpacing:'0.12em', textTransform:'uppercase', marginTop:6 }}>Longevidade com evidencia</div>
        </div>
        <div style={{ animation:'fadeUp 0.5s ease-out 0.12s both' }}>
          <InputField label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
          <InputField label="Senha" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/>
          {error && <p style={{ fontFamily:'Inter', fontSize:12, color:'#e57373', marginBottom:12, textAlign:'center' }}>{error}</p>}
          <button onClick={handleLogin} disabled={loading} style={{
            width:'100%', padding:'15px', background:C.gold, border:'none', borderRadius:14,
            color:'#0D1B2A', fontFamily:'Inter', fontSize:15, fontWeight:700, cursor:'pointer',
            boxShadow:'0 8px 28px rgba(201,169,110,0.28)', marginBottom:12, opacity: loading ? 0.7 : 1 }}>
            {loading ? 'Entrando...' : 'Entrar'}
          </button>
          <button onClick={onRegister} style={{
            width:'100%', padding:'14px', background:'transparent',
            border:`1px solid ${C.border}`, borderRadius:14,
            color:C.muted, fontFamily:'Inter', fontSize:14, fontWeight:500, cursor:'pointer' }}>
            Primeira vez? Criar conta
          </button>
        </div>
      </div>
    </div>
  );
}

// ── REGISTER SCREEN ───────────────────────────────
function RegisterScreen({ onBack }) {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [success, setSuccess] = useState(false);

  const handleRegister = async () => {
    if (!name || !email || !password) return setError('Preencha todos os campos.');
    if (password.length < 6) return setError('Senha deve ter pelo menos 6 caracteres.');
    setLoading(true); setError('');
    const { error: err } = await sb.auth.signUp({ email, password, options: { data: { name } } });
    if (err) { setError(err.message); setLoading(false); return; }
    setSuccess(true); setLoading(false);
  };

  if (success) return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg,
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'0 32px' }}>
      <div style={{ textAlign:'center', maxWidth:280 }}>
        <div style={{ fontSize:48, marginBottom:20 }}>✅</div>
        <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, fontWeight:700, color:C.text, marginBottom:12 }}>Conta criada!</div>
        <p style={{ fontFamily:'Inter', fontSize:14, color:C.muted, lineHeight:1.6, marginBottom:28 }}>Verifique seu email para confirmar a conta, depois faca login.</p>
        <button onClick={onBack} style={{ width:'100%', padding:'15px', background:C.gold, border:'none', borderRadius:14, color:'#0D1B2A', fontFamily:'Inter', fontSize:15, fontWeight:700, cursor:'pointer' }}>
          Fazer Login
        </button>
      </div>
    </div>
  );

  return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg,
      display:'flex', flexDirection:'column', padding:'24px 32px', overflow:'auto' }}>
      <button onClick={onBack} style={{ background:'none', border:'none', cursor:'pointer', color:C.muted, fontFamily:'Inter', fontSize:14, marginBottom:24, textAlign:'left' }}>
        &larr; Voltar
      </button>
      <div style={{ fontFamily:"'Playfair Display', serif", fontSize:26, fontWeight:700, color:C.text, marginBottom:8 }}>Criar conta</div>
      <p style={{ fontFamily:'Inter', fontSize:13, color:C.muted, marginBottom:28 }}>Comece sua jornada de longevidade</p>
      <InputField label="Nome" value={name} onChange={e=>setName(e.target.value)} placeholder="Seu nome"/>
      <InputField label="Email" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com"/>
      <InputField label="Senha" type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Minimo 6 caracteres"/>
      {error && <p style={{ fontFamily:'Inter', fontSize:12, color:'#e57373', marginBottom:12 }}>{error}</p>}
      <button onClick={handleRegister} disabled={loading} style={{
        width:'100%', padding:'15px', background:C.gold, border:'none', borderRadius:14,
        color:'#0D1B2A', fontFamily:'Inter', fontSize:15, fontWeight:700, cursor:'pointer',
        boxShadow:'0 8px 28px rgba(201,169,110,0.28)', opacity: loading ? 0.7 : 1 }}>
        {loading ? 'Criando conta...' : 'Criar conta'}
      </button>
    </div>
  );
}

// ── AI CHAT SCREEN ────────────────────────────────
function AIChatScreen({ onNav, user }) {
  const [messages, setMessages] = useState([
    { role:'assistant', content:'Ola! Sou a IA do Perflow. Posso te ajudar com informacoes sobre peptideos, nutricao e longevidade. Como posso te ajudar hoje?' }
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(null);

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior:'smooth' }); }, [messages]);

  const send = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role:'user', content: input.trim() };
    const newMsgs = [...messages, userMsg];
    setMessages(newMsgs);
    setInput(''); setLoading(true);

    try {
      const res = await fetch('/api/chat', {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({
          messages: newMsgs.map(m => ({ role:m.role, content:m.content })),
          systemPrompt:'Voce e Perflow AI, assistente especializado em peptideos, longevidade e nutricao. Responda sempre em portugues, de forma clara e concisa. Nao faca diagnosticos medicos. Baseie-se em evidencias cientificas.'
        })
      });
      const data = await res.json();
      setMessages([...newMsgs, { role:'assistant', content: data.response || 'Desculpe, ocorreu um erro.' }]);
    } catch(e) {
      setMessages([...newMsgs, { role:'assistant', content:'Erro de conexao. Verifique sua internet e tente novamente.' }]);
    }
    setLoading(false);
  };

  const handleKey = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } };

  return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'16px 24px 12px', flexShrink:0, borderBottom:`1px solid ${C.borderSub}` }}>
        <p style={{ fontFamily:'Inter', fontSize:10, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:C.gold, marginBottom:3 }}>Perflow</p>
        <h2 style={{ fontFamily:"'Playfair Display', serif", fontSize:20, fontWeight:700, color:C.text }}>IA de Longevidade</h2>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'16px 20px' }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display:'flex', justifyContent: m.role==='user' ? 'flex-end' : 'flex-start', marginBottom:12 }}>
            <div style={{
              maxWidth:'80%', padding:'11px 14px', borderRadius: m.role==='user' ? '18px 18px 4px 18px' : '18px 18px 18px 4px',
              background: m.role==='user' ? C.gold : C.bgGold,
              border: m.role==='user' ? 'none' : `1px solid ${C.border}`,
              color: m.role==='user' ? '#0D1B2A' : C.text,
              fontFamily:'Inter', fontSize:13, lineHeight:1.55
            }}>{m.content}</div>
          </div>
        ))}
        {loading && (
          <div style={{ display:'flex', justifyContent:'flex-start', marginBottom:12 }}>
            <div style={{ padding:'11px 18px', borderRadius:'18px 18px 18px 4px', background:C.bgGold, border:`1px solid ${C.border}`, color:C.muted, fontFamily:'Inter', fontSize:13 }}>
              Pensando...
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      <div style={{ padding:'12px 16px', borderTop:`1px solid ${C.borderSub}`, flexShrink:0, marginBottom:78 }}>
        <div style={{ display:'flex', gap:10, alignItems:'flex-end' }}>
          <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={handleKey}
            placeholder="Pergunte sobre peptideos, nutricao..." rows={1}
            style={{ flex:1, background:C.bgCard, border:`1px solid ${C.border}`,
              borderRadius:14, padding:'11px 14px', fontFamily:'Inter', fontSize:13,
              color:C.text, outline:'none', resize:'none' }}/>
          <button onClick={send} disabled={!input.trim() || loading} style={{
            width:42, height:42, borderRadius:12, background: input.trim() ? C.gold : 'rgba(201,169,110,0.2)',
            border:'none', cursor: input.trim() ? 'pointer' : 'default',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={input.trim() ? '#0D1B2A' : C.muted} strokeWidth="2.5" strokeLinecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
      <TabBar active="ai" onTab={onNav}/>
    </div>
  );
}

// ── HOME SCREEN ───────────────────────────────────

          <div style={{ background:C.bgGold, border:`1px solid ${C.border}`, borderRadius:20, padding:'20px' }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:14 }}>
              <div>
                <p style={{ fontFamily:'Inter', fontSize:10, fontWeight:700, letterSpacing:'0.2em', textTransform:'uppercase', color:C.gold, marginBottom:6 }}>Protocolo Ativo</p>
                <h2 style={{ fontFamily:"'Playfair Display', serif", fontSize:22, fontWeight:700, color:C.text }}>BPC-157</h2>

              </div>

            <div style={{ marginBottom:14 }}>

              { icon:'🤖', label:'Consultar IA', nav:'ai' },

            ].map(item=>(

// ── REGISTRAR REFEICAO ────────────────────────────
function RegistrarRefeicaoScreen({ onBack, onConfirmar, user }) {
  const [desc, setDesc] = useState('');
  const [estimativa, setEstimativa] = useState(null);
  const [aiLoading, setAiLoading] = useState(false);
  const [saving, setSaving] = useState(false);
  const sugestoes = ['Frango grelhado','Salada verde','Whey protein','Arroz integral','Ovo cozido','Abacate'];

  const analyzeFood = async (text) => {
    if (!text || text.length < 4) return;
    setAiLoading(true);
    try {
      const res = await fetch('/api/chat', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          messages:[{ role:'user', content:`Estime os macronutrientes desta refeicao: "${text}". Responda APENAS com JSON valido no formato: {"kcal":number,"proteina":number,"carboidrato":number,"gordura":number}` }],
          systemPrompt:'Voce e um nutricionista. Estime macros de alimentos. Responda APENAS com JSON valido, sem texto adicional, sem markdown.'
        })
      });
      const data = await res.json();
      const cleaned = data.response.replace(/```json|```/g,'').trim();
      const nutrition = JSON.parse(cleaned);
      setEstimativa(nutrition);
    } catch(e) { setEstimativa({ kcal:400, proteina:30, carboidrato:45, gordura:12 }); }
    setAiLoading(false);
  };

  const handleSugestao = (s) => {
    const newDesc = desc ? desc + ', ' + s : s;
    setDesc(newDesc);
    analyzeFood(newDesc);
  };

  const handleConfirmar = async () => {
    if (!estimativa) return;
    setSaving(true);
    if (user) {
      await sb.from('meal_logs').insert({
        user_id: user.id, description: desc,
        kcal: estimativa.kcal, proteina: estimativa.proteina,
        carboidrato: estimativa.carboidrato, gordura: estimativa.gordura
      });
    }
    setSaving(false);
    onConfirmar();
  };

  return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'16px 24px 12px', display:'flex', alignItems:'center', gap:14, flexShrink:0 }}>
        <button onClick={onBack} style={{ background:C.bgCard, border:`1px solid ${C.borderSub}`, borderRadius:10, width:34, height:34, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer' }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div>
          <p style={{ fontFamily:'Inter', fontSize:10, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:C.gold, marginBottom:2 }}>Nutricao</p>
          <h2 style={{ fontFamily:"'Playfair Display', serif", fontSize:19, fontWeight:700, color:C.text }}>Registrar Refeicao</h2>
        </div>
      </div>

      <div style={{ flex:1, overflowY:'auto', padding:'4px 24px 24px' }}>
        <div style={{ marginBottom:14 }}>
          <label style={{ fontFamily:'Inter', fontSize:11, color:C.muted, letterSpacing:'0.06em', display:'block', marginBottom:8 }}>Descreva o que comeu</label>
          <textarea value={desc} onChange={e=>setDesc(e.target.value)} onBlur={()=>analyzeFood(desc)}
            placeholder="Ex: Frango grelhado 150g, arroz integral, salada..."
            style={{ width:'100%', minHeight:88, background:C.bgCard, border:`1px solid ${C.border}`,
              borderRadius:14, padding:'13px 15px', fontFamily:'Inter', fontSize:13, color:C.text, lineHeight:1.55, resize:'none', outline:'none' }}/>
        </div>

        <div style={{ marginBottom:16 }}>
          <p style={{ fontFamily:'Inter', fontSize:11, color:C.muted2, letterSpacing:'0.06em', marginBottom:9 }}>Sugestoes rapidas</p>
          <div style={{ display:'flex', flexWrap:'wrap', gap:8 }}>
            {sugestoes.map(s=>(
              <button key={s} onClick={()=>handleSugestao(s)} style={{
                padding:'7px 14px', borderRadius:20, background:C.bgCard, border:`1px solid ${C.borderSub}`,
                fontFamily:'Inter', fontSize:12, color:C.muted, cursor:'pointer' }}>{s}</button>
            ))}
          </div>
        </div>

        {aiLoading && (
          <div style={{ background:C.bgGold, border:`1px solid ${C.border}`, borderRadius:16, padding:'16px 18px', marginBottom:20, textAlign:'center' }}>
            <p style={{ fontFamily:'Inter', fontSize:13, color:C.gold }}>Analisando com IA...</p>
          </div>
        )}

        {estimativa && !aiLoading && (
          <div style={{ animation:'fadeUp 0.4s ease-out both', marginBottom:20 }}>
            <div style={{ background:C.bgGold, border:`1px solid ${C.border}`, borderRadius:16, padding:'16px 18px' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:12 }}>
                <div style={{ width:28, height:28, borderRadius:8, background:'rgba(201,169,110,0.18)', border:`1px solid ${C.border}`, display:'flex', alignItems:'center', justifyContent:'center', fontSize:14 }}>🤖</div>
                <div>
                  <p style={{ fontFamily:'Inter', fontSize:11, fontWeight:700, color:C.gold }}>IA estimou</p>
                  <p style={{ fontFamily:'Inter', fontSize:10, color:C.muted2 }}>Baseado na descricao</p>
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'baseline', gap:6, marginBottom:10 }}>
                <span style={{ fontFamily:"'Playfair Display', serif", fontSize:28, fontWeight:700, color:C.text }}>{estimativa.kcal}</span>
                <span style={{ fontFamily:'Inter', fontSize:13, color:C.muted }}>kcal</span>
              </div>
              <div style={{ display:'flex', gap:16 }}>
                {[
                  { l:'Proteina', v:`${estimativa.proteina}g`, c:C.gold },
                  { l:'Carboidr.', v:`${estimativa.carboidrato}g`, c:'#A8C4D4' },
                  { l:'Gordura', v:`${estimativa.gordura}g`, c:'#D4A8B4' },
                ].map(m=>(
                  <div key={m.l}>
                    <p style={{ fontFamily:'Inter', fontSize:9, textTransform:'uppercase', letterSpacing:'0.08em', color:C.muted2, marginBottom:2 }}>{m.l}</p>
                    <p style={{ fontFamily:'Inter', fontSize:14, fontWeight:700, color:m.c }}>{m.v}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        <button onClick={handleConfirmar} disabled={!estimativa || saving} style={{
          width:'100%', padding:'15px',
          background: estimativa ? C.gold : 'rgba(201,169,110,0.28)',
          border:'none', borderRadius:14,
          color: estimativa ? '#0D1B2A' : C.muted,
          fontFamily:'Inter', fontSize:14, fontWeight:700,
          cursor: estimativa ? 'pointer' : 'default',
          boxShadow: estimativa ? '0 8px 24px rgba(201,169,110,0.26)' : 'none',
          transition:'all 0.2s' }}>
          {saving ? 'Salvando...' : estimativa ? 'Confirmar Refeicao' : 'Descreva a refeicao primeiro'}
        </button>
      </div>
    </div>
  );
}

function NutricaoScreen({ onNav, user }) {
  const [meals, setMeals] = useState([]);

  useEffect(()=>{
    if (!user) return;
    const today = new Date().toISOString().split('T')[0];
    sb.from('meal_logs').select('*').eq('user_id', user.id).gte('created_at', today).order('created_at', {ascending:true})
      .then(({data})=>{ if(data) setMeals(data); });

  const totalKcal = meals.reduce((s,r)=>s+(r.kcal||0),0);

                  strokeDasharray={`${circumference*pct/100} ${circumference*(1-pct/100)}`}

              <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' }}>

            <div style={{ flex:1 }}>

                      <p style={{ fontFamily:"'Playfair Display', serif", fontSize:16, fontWeight:600, color:C.gold }}>{r.kcal}</p>
                      <p style={{ fontFamily:'Inter', fontSize:9, color:C.muted2 }}>kcal</p>
                    </div>

function MetaNutricionalScreen({ onBack, user }) {
  const [metaKcal, setMetaKcal] = useState(1800);
  const [objetivo, setObjetivo] = useState('perda');
  const [saved, setSaved] = useState(false);
  const [saving, setSaving] = useState(false);
  const OBJETIVOS = [{ id:'perda',label:'Perda de peso',icon:'↓' },{ id:'manutencao',label:'Manutencao',icon:'⟷' },{ id:'ganho',label:'Ganho de massa',icon:'↑' }];

  useEffect(()=>{
    if(!user) return;
    sb.from('goals').select('*').eq('user_id',user.id).single().then(({data})=>{
      if(data){ setObjetivo(data.objetivo); setMetaKcal(data.meta_kcal); setSaved(true); }
    });
  },[user]);

  const handleSave = async () => {
    setSaving(true);
    if(user){ await sb.from('goals').upsert({ user_id:user.id, objetivo, meta_kcal:metaKcal }, { onConflict:'user_id' }); }
    setSaved(true); setSaving(false);

  return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg, display:'flex', flexDirection:'column' }}>
      <div style={{ padding:'16px 24px 0', display:'flex', alignItems:'center', gap:14, flexShrink:0 }}>

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.muted} strokeWidth="2.2" strokeLinecap="round"><path d="M15 18l-6-6 6-6"/></svg>

        <div>
          <p style={{ fontFamily:'Inter', fontSize:10, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase', color:C.gold, marginBottom:2 }}>Nutricao</p>

        </div>
      </div>
      <div style={{ flex:1, overflowY:'auto', padding:'16px 24px 24px' }}>
        <div style={{ marginBottom:20 }}>
          <p style={{ fontFamily:'Inter', fontSize:11, color:C.muted, marginBottom:11 }}>Objetivo</p>
          <div style={{ display:'flex', gap:8 }}>
            {OBJETIVOS.map(o=>(
              <button key={o.id} onClick={()=>{setObjetivo(o.id);setSaved(false);}} style={{ flex:1, padding:'11px 6px', background:objetivo===o.id?C.bgGold:C.bgCard, border:`1px solid ${objetivo===o.id?C.border:C.borderSub}`, borderRadius:14, cursor:'pointer', textAlign:'center' }}>

              </button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom:22 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
            <p style={{ fontFamily:'Inter', fontSize:11, color:C.muted }}>Meta calorica diaria</p>
            <p style={{ fontFamily:"'Playfair Display', serif", fontSize:20, fontWeight:700, color:C.gold }}>{metaKcal} <span style={{ fontSize:11, color:C.muted, fontFamily:'Inter', fontWeight:400 }}>kcal</span></p>
          </div>
          <input type="range" min="1200" max="2800" step="50" value={metaKcal}
            onChange={e=>{setMetaKcal(Number(e.target.value));setSaved(false);}}
            style={{ width:'100%', height:4, appearance:'none', background:`linear-gradient(to right, ${C.gold} ${(metaKcal-1200)/16}%, rgba(255,255,255,0.1) ${(metaKcal-1200)/16}%)`, borderRadius:2, outline:'none', cursor:'pointer' }}/>
          <div style={{ display:'flex', justifyContent:'space-between', marginTop:7 }}>

      </div>

            <div key={i} style={{ background:C.bgCard, border:`1px solid ${C.borderSub}`, borderRadius:16, padding:'16px' }}>
              <div style={{ display:'inline-block', padding:'3px 10px', borderRadius:20, background:C.bgGold, border:`1px solid ${C.border}`, fontFamily:'Inter', fontSize:10, color:C.gold, marginBottom:8 }}>{a.tag}</div>
              <p style={{ fontFamily:"'Playfair Display', serif", fontSize:15, fontWeight:600, color:C.text, lineHeight:1.4, marginBottom:6 }}>{a.titulo}</p>
              <p style={{ fontFamily:'Inter', fontSize:11, color:C.muted }}>{a.fonte} · {a.ano} · {a.mins} min</p>
            </div>
          ))}
        </div>
        <div style={{ height:24 }}/>
      </div>
      <TabBar active="biblioteca" onTab={onNav}/>
    </div>
  );
}

// ── PERFIL SCREEN ─────────────────────────────────
function PerfilScreen({ onNav, user, onLogout }) {
  const name = user?.user_metadata?.name || 'Usuario';
  const email = user?.email || '';
  const [stats, setStats] = useState({ meals:0, protocols:0 });

  useEffect(()=>{
    if(!user) return;
    Promise.all([
      sb.from('meal_logs').select('id',{count:'exact'}).eq('user_id',user.id),
      sb.from('protocol_logs').select('id',{count:'exact'}).eq('user_id',user.id)
    ]).then(([m,p])=>{ setStats({ meals:m.count||0, protocols:p.count||0 }); });
  },[user]);

  return (
    <div className="screen-enter" style={{ width:'100%', height:'100%', background:C.bg, position:'relative' }}>
      <div style={{ height:'calc(100% - 78px)', overflowY:'auto' }}>
        <div style={{ padding:'24px 24px 0', display:'flex', flexDirection:'column', alignItems:'center', animation:'fadeUp 0.5s ease-out both' }}>
          <Monogram size={72}/>
          <div style={{ fontFamily:"'Playfair Display', serif", fontSize:22, fontWeight:700, color:C.text, marginTop:14 }}>{name}</div>
          <div style={{ fontFamily:'Inter', fontSize:12, color:C.muted, marginTop:4 }}>{email}</div>
        </div>

        <div style={{ padding:'20px 24px 0', display:'flex', gap:10, animation:'fadeUp 0.5s ease-out 0.1s both' }}>
          {[{ label:'Refeicoes', value:stats.meals }, { label:'Protocolos', value:stats.protocols }].map((s,i)=>(
            <div key={i} style={{ flex:1, background:C.bgGold, border:`1px solid ${C.border}`, borderRadius:16, padding:'16px', textAlign:'center' }}>
              <div style={{ fontFamily:"'Playfair Display', serif", fontSize:28, fontWeight:700, color:C.gold }}>{s.value}</div>
              <div style={{ fontFamily:'Inter', fontSize:11, color:C.muted, marginTop:4 }}>{s.label} registradas</div>
            </div>
          ))}
        </div>

        <div style={{ padding:'20px 24px 0', animation:'fadeUp 0.5s ease-out 0.2s both' }}>
          <button onClick={()=>onNav('ai')} style={{ width:'100%', padding:'15px', background:C.gold, border:'none', borderRadius:14, color:'#0D1B2A', fontFamily:'Inter', fontSize:14, fontWeight:700, cursor:'pointer', boxShadow:'0 6px 22px rgba(201,169,110,0.22)', marginBottom:12 }}>
            Consultar IA de Longevidade
          </button>
          <button onClick={onLogout} style={{ width:'100%', padding:'14px', background:'transparent', border:`1px solid rgba(200,70,70,0.3)`, borderRadius:14, color:'rgba(230,100,100,0.8)', fontFamily:'Inter', fontSize:14, fontWeight:500, cursor:'pointer' }}>
            Sair da conta
          </button>
        </div>
        <div style={{ height:24 }}/>
      </div>
      <TabBar active="perfil" onTab={onNav}/>
    </div>
  );
}

// ── MAIN APP ──────────────────────────────────────
function PerflowApp() {
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [authMode, setAuthMode] = useState('login');
  const [screen, setScreen] = useState('home');

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user ?? null);
      setLoading(false);
    });
    const { data:{ subscription } } = sb.auth.onAuthStateChange((event, session)=>{
      setUser(session?.user ?? null);
      if (session?.user) setScreen('home');
    });
    return ()=>subscription.unsubscribe();
  },[]);

  const go = id => setScreen(id);
  const logout = async () => { await sb.auth.signOut(); setScreen('home'); setAuthMode('login'); };

  if (loading) return (
    <IosFrame>
      <div style={{ width:'100%', height:'100%', display:'flex', alignItems:'center', justifyContent:'center', background:C.bg }}>
        <div style={{ textAlign:'center' }}>
          <Monogram size={60}/>
          <p style={{ fontFamily:'Inter', fontSize:13, color:C.muted, marginTop:16 }}>Carregando...</p>
        </div>
      </div>
    </IosFrame>
  );

  if (!user) return (
    <IosFrame>
      {authMode === 'login'
        ? <LoginScreen onRegister={()=>setAuthMode('register')}/>
        : <RegisterScreen onBack={()=>setAuthMode('login')}/>
      }
    </IosFrame>
  );

  return (
    <IosFrame>
      {screen === 'home'      && <HomeScreen onNav={go} user={user}/>}
      {screen === 'protocolo' && <ProtocoloScreen onNav={go} user={user}/>}
      {screen === 'nutricao'  && <NutricaoScreen onNav={go} user={user}/>}
      {screen === 'registrar' && <RegistrarRefeicaoScreen onBack={()=>go('nutricao')} onConfirmar={()=>go('nutricao')} user={user}/>}
      {screen === 'dashboard' && <DashboardSemanalScreen onBack={()=>go('nutricao')} onNav={go}/>}
      {screen === 'meta'      && <MetaNutricionalScreen onBack={()=>go('nutricao')} user={user}/>}
      {screen === 'biblioteca'&& <BibliotecaScreen onNav={go}/>}
      {screen === 'ai'        && <AIChatScreen onNav={go} user={user}/>}
      {screen === 'perfil'    && <PerfilScreen onNav={go} user={user} onLogout={logout}/>}
    </IosFrame>
  );
}

  return (

}
